name: Typecheck

on:
  push:
    branches: [main]
  pull_request:

jobs:
  app:
    name: App (Expo / React Native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  bridge:
    name: Bridge (Node LAN service)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bridge/package-lock.json
      - run: npm ci
      - run: npm run typecheck
